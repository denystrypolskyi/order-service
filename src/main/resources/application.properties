spring.application.name=order-service

# PostgreSQL config
spring.datasource.url=jdbc:postgresql://localhost:5435/orderdb
spring.datasource.username=postgres
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:mysecurepass123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

server.port=8084

product.service.url=http://localhost:8082

# RabbitMQ configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

jwt.secret=${JWT_SECRET:dev-only-change-me-secret-key-32bytes}
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
